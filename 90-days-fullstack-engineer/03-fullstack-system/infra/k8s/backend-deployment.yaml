apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-backend
  template:
    metadata:
      labels:
        app: platform-backend
    spec:
      containers:
        - name: backend
          image: platform-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: PG_CONNECTION
              value: postgresql://user:password@postgres:5432/platform
            - name: MONGO_URI
              value: mongodb://mongo:27017/platform
            - name: REDIS_URL
              value: redis://redis:6379
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: jwtSecret
            - name: REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: refreshSecret
