apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
    - host: platform.local
      http:
        paths:
          - path: /backend/(.*)
            pathType: Prefix
            backend:
              service:
                name: platform-backend
                port:
                  number: 5000
          - path: /frontend/(.*)
            pathType: Prefix
            backend:
              service:
                name: platform-frontend
                port:
                  number: 3000
          - path: /ai/(.*)
            pathType: Prefix
            backend:
              service:
                name: ai-service
                port:
                  number: 8000
