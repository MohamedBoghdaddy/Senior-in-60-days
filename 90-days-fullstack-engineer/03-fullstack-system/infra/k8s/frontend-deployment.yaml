apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-frontend
  template:
    metadata:
      labels:
        app: platform-frontend
    spec:
      containers:
        - name: frontend
          image: platform-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: REACT_APP_API_URL
              value: http://platform-backend:5000/api
